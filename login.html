<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PYP Tornillos</title>
    <link rel="icon" href="img/icono.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-form-container">
            <a href="index.html"><img src="img/descarga.png" alt="Logo PYP" class="login-logo"></a>
            <form id="auth-form" class="login-form" autocomplete="off">
                <div id="form-title" class="form-title">Iniciar Sesión</div>

                <label for="auth-email" class="label">Correo electrónico:</label>
                <input type="email" id="auth-email" placeholder="correo@ejemplo.com" class="input-password" required>

                <label for="auth-password" class="label">Contraseña:</label>
                <input type="password" id="auth-password" placeholder="**********" class="input-password" required>

                <div id="confirm-group" style="display:none;">
                    <label for="auth-confirm" class="label">Confirmar contraseña:</label>
                    <input type="password" id="auth-confirm" placeholder="**********" class="input-password">
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" id="auth-submit" class="primary-button">Ingresar</button>

                <p class="toggle-auth">
                    <a href="#" id="toggle-link">¿No tienes cuenta? Regístrate</a>
                </p>
                <p class="resend">
                    <a href="#" id="reset-link">¿Olvidaste tu contraseña?</a>
                </p>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
