<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo - PYP Tornillos</title>
    <link rel="icon" href="img/icono.ico">
    <link rel="stylesheet" href="styles.css">
    <style>
        .cat-page-header {
            background: var(--bg-card);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }
        .cat-page-header h1 {
            font-size: 1.2rem;
            color: var(--primary);
            flex: 1;
            margin: 0;
        }
        .cat-jump {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.75rem 1rem;
            background: #111;
            border-bottom: 1px solid #222;
            scrollbar-width: none;
        }
        .cat-jump::-webkit-scrollbar { display: none; }
        .cat-jump a {
            background: var(--bg-card);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            border: 1px solid #333;
            transition: all 0.2s;
        }
        .cat-jump a:hover, .cat-jump a.active {
            color: var(--primary);
            border-color: var(--primary);
        }
        .cat-page-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .cat-page-section h2 {
            font-size: 1.1rem;
            color: var(--primary);
            margin: 1.5rem 0 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cat-page-section h2 .count {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .cat-page-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }
        .cat-page-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .cat-page-item:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .cat-page-item img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            border-radius: 6px;
            background: #111;
            margin-bottom: 0.5rem;
        }
        .cat-page-item .prod-name {
            font-size: 0.78rem;
            font-weight: 700;
            color: #eee;
            line-height: 1.2;
            margin-bottom: 0.25rem;
        }
        .cat-page-item .prod-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .cat-page-item .prod-price {
            font-size: 0.9rem;
            font-weight: 900;
            color: #2ecc71;
        }

        @media (min-width: 768px) {
            .cat-page-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
            .cat-page-section { padding: 2rem; }
            .cat-page-item img { height: 130px; }
        }
        @media (min-width: 1024px) {
            .cat-page-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="cat-page-header">
        <a href="index.html" class="btn-back" style="background:none;border:none;color:var(--text-light);font-size:1.5rem;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;text-decoration:none;">&#8592;</a>
        <h1>Catálogo Completo</h1>
        <a href="login.html" style="color:var(--text-muted);font-size:0.75rem;font-weight:700;white-space:nowrap;text-decoration:none;">Ingresar</a>
    </div>

    <!-- Jump links -->
    <nav class="cat-jump" id="cat-jump">
        <a href="#cat-tornillos">Tornillería</a>
        <a href="#cat-herramientas">Herramientas</a>
        <a href="#cat-maquinaria">Maquinaria</a>
        <a href="#cat-hogar">Hogar</a>
    </nav>

    <!-- Product sections rendered by JS -->
    <div class="cat-page-section" id="cat-page-content"></div>

    <!-- Product Modal (same shared modal) -->
    <div class="prod-modal" id="prod-modal">
        <div class="prod-modal-content">
            <button class="prod-modal-close" id="prod-modal-close">&times;</button>
            <img id="modal-img" src="" alt="" class="prod-modal-img">
            <div class="prod-modal-body">
                <h3 id="modal-title"></h3>
                <p class="prod-modal-desc" id="modal-desc"></p>
                <p class="prod-modal-price" id="modal-price"></p>
                <button class="btn" id="modal-order">ORDENAR AL CARRITO</button>
            </div>
        </div>
    </div>

    <!-- Floating Cart -->
    <div class="cart-fab" id="cart-fab">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.86-7.01L19.42 4l-3.87 7H8.53L4.27 2H1v2h2l3.6 7.59L5.25 14c-.13.35-.25.74-.25 1.15 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg>
        <span class="cart-fab-badge" id="cart-badge">0</span>
    </div>

    <!-- Cart Drawer -->
    <div class="cart-drawer-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer-header">
            <h3>Carrito de Compras</h3>
            <button class="cart-drawer-close" id="cart-close">&times;</button>
        </div>
        <div class="cart-drawer-items" id="cart-items">
            <div class="cart-empty">El carrito está vacío.</div>
        </div>
        <div class="cart-drawer-footer" id="cart-footer" style="display:none;">
            <div class="cart-total" id="cart-total">Total: $0</div>
            <button class="btn" id="cart-order">ORDENAR POR WHATSAPP</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
